# Vale configuration for CPRR experiment validation
# Tests conjecture: Vale is better than custom linters for content validation
#
# FINDING: Vale excels at PROSE QUALITY, not STRUCTURE validation.
# Use lint-experiments.sh for "must have section X" checks.
# Use Vale for style, hedging language, passive voice, etc.

StylesPath = styles

# Use suggestion level to catch style issues
MinAlertLevel = suggestion

# Optional: sync external packages (uncomment and run `vale sync`)
# Packages = write-good

# Apply CPRR style rules to all markdown in experiments
[*.md]
BasedOnStyles = CPRR

# Disable structural checks - they don't work as intended with Vale
# Vale's existence extension fires when tokens ARE found, not when missing
CPRR.ConjectureStructure = NO
CPRR.ProofStructure = NO
CPRR.RefutationStructure = NO
CPRR.RefinementStructure = NO

# Keep prose quality checks enabled
CPRR.PassiveVoice = YES
CPRR.WeakClaims = YES
CPRR.FalsificationRequired = YES
